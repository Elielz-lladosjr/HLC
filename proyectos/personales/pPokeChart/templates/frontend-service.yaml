apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.frontend.name }}
  namespace: {{ .Values.namespace }}
spec:
  type: NodePort # Para que entres por la IP de tu VPS
  selector:
    app: poke-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080 # Puerto para entrar a la web (Ej: http://tu-ip:30080)